name: Import DB to Railway

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  import-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Import SQL to Railway
        env:
          MYSQL_URL: ${{ secrets.MYSQL_URL }}
        run: |
          # 1. Parse the URL manually
          # URL format: mysql://user:pass@host:port/dbname
          
          # Remove mysql:// prefix
          URL_NO_PROTOCOL=${MYSQL_URL#mysql://}
          
          # Split user:pass and host:port/db
          AUTH=${URL_NO_PROTOCOL%%@*}
          HOST_DB=${URL_NO_PROTOCOL#*@}
          
          USER=${AUTH%%:*}
          PASS=${AUTH#*:}
          
          HOST_PORT=${HOST_DB%%/*}
          DB=${HOST_DB#*/}
          
          HOST=${HOST_PORT%%:*}
          PORT=${HOST_PORT#*:}
          
          echo "Connecting to $HOST:$PORT..."
          
          # 2. Delete the first 15 lines of schema.sql (the CREATE DATABASE and USE blocks)
          sed -i '1,15d' sql/schema.sql
          
          # 3. RUN the import
          mysql -h $HOST -P $PORT -u $USER -p$PASS $DB < sql/schema.sql
          
          echo "✅ Database import successful!"
