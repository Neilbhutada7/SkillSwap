<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSwap – Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="app-content">

    <div class="home-welcome">
      <h1>Welcome</h1>
      <p>You have no upcoming sessions</p>
    </div>

    <div class="home-grid">

      <div class="home-left">

        <div class="setup-card" id="setupCard">
          <button class="setup-card-close" id="setupClose">&times;</button>
          <h3>Let's start with the basics</h3>
          <p>Get more by setting up a profile you love.</p>
          <div class="setup-progress-bar">
            <div class="setup-progress-fill"></div>
          </div>
          <div class="setup-pct">50% completed</div>
          <div class="setup-items">
            <div class="setup-item">
              <div class="check-circle done">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <span style="text-decoration:line-through;color:var(--text-muted);">Verify email</span>
            </div>
            <div class="setup-item">
              <div class="check-circle"></div>
              <span>
                <a href="explore.html">Book your first session</a>
                <span class="dim"> — Learn/network with mentors.</span>
              </span>
            </div>
          </div>
        </div>

        <!-- <div class="ai-goal-card">
          <h3>Share your goal, meet your mentor <span class="beta-tag">Beta</span></h3>
          <p>Suggestions for you</p>
          <div class="suggestion-chips">
            <div class="chip">Need help transitioning from IC designer to design manager</div>
            <div class="chip">Need advice on building my first B2B SaaS GTM strategy</div>
            <div class="chip">How to build a personal brand in product leadership</div>
            <div class="chip">How to build my executive presence and negotiation in meetings</div>
          </div>
        </div> -->

      </div>

      <div class="home-right">

        <div class="profile-strength-card" onclick="window.location.href='profile.html'">
          <div>
            <div class="ps-label">Your profile strength</div>
            <div class="ps-value">Youngling</div>
            <div class="ps-bar"><div class="ps-bar-fill"></div></div>
          </div>
          <div class="ps-arrow">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </div>

        <!-- <div class="invites-card">
          <div class="invites-card-left">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            <p>You have 3 invites</p>
          </div>
          <span class="gift-link">Gift invite</span>
        </div> -->

        <div class="teach-card">
          <div class="credits-badge">+10 credits</div>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.5" style="margin-bottom:12px;display:block;"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <h3>Teach a Session</h3>
          <p>Host a 1:1 session and share your skills</p>
          <button class="btn-teach">Start Teaching</button>
        </div>

      </div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="home.js"></script>
</body>
</html>
